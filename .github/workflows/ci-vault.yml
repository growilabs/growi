name: Node CI for Vault Manager

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - release/**
      - rc/**
      - changeset-release/**
      - mergify/merge-queue/**
      - tmp-mergify/merge-queue/**
    paths:
      - apps/growi-vault-manager/**
      - .github/workflows/ci-vault.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  vault-manager-integ:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Cache/Restore dist
        uses: actions/cache@v4
        with:
          path: |
            **/.turbo
            **/dist
            **/node_modules/.cache/turbo
          key: dist-vault-integ-${{ runner.OS }}-node${{ matrix.node-version }}-${{ github.sha }}
          restore-keys: |
            dist-vault-integ-${{ runner.OS }}-node${{ matrix.node-version }}-

      - name: Install dependencies
        run: |
          pnpm add turbo --global
          pnpm install --frozen-lockfile

      - name: Build vault-manager
        run: |
          turbo run build --filter @growi/vault-manager

      - name: Start MongoDB (replica set)
        uses: supercharge/mongodb-github-action@1.12.1
        with:
          mongodb-version: '6.0'
          mongodb-replica-set: rs0

      - name: Run integration tests
        run: |
          pnpm --filter @growi/vault-manager test:integ
        env:
          RUN_VAULT_INTEG: "true"
          # Base URI only. The per-worker test setup
          # (src/__tests__/setup/integ-server.ts) derives an isolated database
          # name (growi-vault-integ-<workerId>) and boots an in-process
          # vault-manager bound to it, so test files run in parallel without
          # sharing a single instruction-processing pipeline.
          MONGO_URI: mongodb://localhost:27017/growi-vault-integ?replicaSet=rs0
          VAULT_MANAGER_INTERNAL_SECRET: ${{ secrets.VAULT_MANAGER_INTERNAL_SECRET || 'test-secret-for-integration' }}
          # Short maintenance tick so the squash test doesn't wait for the
          # 5-minute production cadence.
          VAULT_MAINTENANCE_TICK_MS: '5000'

