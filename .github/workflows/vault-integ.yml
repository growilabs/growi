name: Vault Manager Integration Tests

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - release/**
      - rc/**
      - changeset-release/**
      - mergify/merge-queue/**
      - tmp-mergify/merge-queue/**
    paths:
      - apps/growi-vault-manager/**
      - .github/workflows/vault-integ.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  vault-manager-integ:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Cache/Restore dist
        uses: actions/cache@v4
        with:
          path: |
            **/.turbo
            **/dist
            **/node_modules/.cache/turbo
          key: dist-vault-integ-${{ runner.OS }}-node${{ matrix.node-version }}-${{ github.sha }}
          restore-keys: |
            dist-vault-integ-${{ runner.OS }}-node${{ matrix.node-version }}-

      - name: Install dependencies
        run: |
          pnpm add turbo --global
          pnpm install --frozen-lockfile

      - name: Build vault-manager
        run: |
          turbo run build --filter @growi/vault-manager

      # vault-manager subscribes to MongoDB change streams at startup, which
      # require a replica-set deployment. The standalone services: container
      # used elsewhere in this repo is not sufficient — start mongo manually
      # with --replSet and run rs.initiate before launching vault-manager.
      - name: Start MongoDB (replica set)
        run: |
          docker run -d --name mongodb -p 27017:27017 \
            mongo:6.0 mongod --replSet rs0 --bind_ip_all

          echo "Waiting for mongod to accept connections..."
          for i in $(seq 1 30); do
            if docker exec mongodb mongosh --quiet --eval "db.adminCommand('ping').ok" 2>/dev/null | grep -q 1; then
              echo "mongod is up"
              break
            fi
            sleep 2
          done

          docker exec mongodb mongosh --quiet --eval \
            "rs.initiate({_id:'rs0', members:[{_id:0, host:'localhost:27017'}]})"

          echo "Waiting for replica set primary..."
          for i in $(seq 1 30); do
            state=$(docker exec mongodb mongosh --quiet --eval "rs.status().myState" 2>/dev/null || echo "")
            if [ "$state" = "1" ]; then
              echo "primary is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Replica set primary did not become ready in time"
          docker logs mongodb || true
          exit 1

      - name: Start vault-manager
        working-directory: apps/growi-vault-manager
        run: |
          node dist/index.js &
          echo "VAULT_MANAGER_PID=$!" >> "$GITHUB_ENV"
        env:
          NODE_ENV: production
          MONGO_URI: mongodb://localhost:27017/growi-vault-integ?replicaSet=rs0
          VAULT_MANAGER_INTERNAL_SECRET: ${{ secrets.VAULT_MANAGER_INTERNAL_SECRET || 'test-secret-for-integration' }}
          VAULT_REPO_PATH: ${{ runner.temp }}/vault-repo

      - name: Wait for vault-manager to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/health > /dev/null 2>&1; then
              echo "vault-manager is ready"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "vault-manager did not become ready in time"
          exit 1

      - name: Run integration tests
        run: |
          pnpm --filter @growi/vault-manager test:integ
        env:
          RUN_VAULT_INTEG: "true"
          VAULT_MANAGER_BASE_URL: http://localhost:3001
          VAULT_MANAGER_INTERNAL_SECRET: ${{ secrets.VAULT_MANAGER_INTERNAL_SECRET || 'test-secret-for-integration' }}

      - name: Stop vault-manager
        if: always()
        run: |
          if [ -n "$VAULT_MANAGER_PID" ]; then
            kill "$VAULT_MANAGER_PID" || true
          fi

      - name: Stop MongoDB
        if: always()
        run: |
          docker rm -f mongodb || true
