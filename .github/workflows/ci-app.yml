name: Node CI for app development

on:
  push:
    branches-ignore:
      - release/**
      - rc/**
      - changeset-release/**
      - mergify/merge-queue/**
      - tmp-mergify/merge-queue/**
    paths:
      - .github/mergify.yml
      - .github/workflows/ci-app.yml
      - biome.json
      - tsconfig.base.json
      - turbo.json
      - pnpm-lock.yaml
      - package.json
      - apps/app/**
      - '!apps/app/docker/**'
      - packages/**
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - .github/mergify.yml
      - .github/workflows/ci-app.yml
      - biome.json
      - tsconfig.base.json
      - turbo.json
      - pnpm-lock.yaml
      - package.json
      - apps/app/**
      - '!apps/app/docker/**'
      - packages/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  ci-app-lint:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Cache/Restore dist
        uses: actions/cache@v4
        with:
          path: |
            **/.turbo
            **/dist
            **/node_modules/.cache/turbo
          key: dist-ci-app-${{ runner.OS }}-node${{ matrix.node-version }}-${{ github.sha }}
          restore-keys: |
            dist-ci-app-${{ runner.OS }}-node${{ matrix.node-version }}-

      - name: Install dependencies
        run: |
          pnpm add turbo --global
          pnpm install --frozen-lockfile

      - name: Lint
        run: |
          turbo run lint --filter=@growi/app --filter=./packages/*

      - name: Slack Notification
        uses: weseek/ghaction-slack-notification@master
        if: failure()
        with:
          type: ${{ job.status }}
          job_name: '*Node CI for growi - lint (${{ matrix.node-version }})*'
          channel: '#ci'
          isCompactMode: true
          url: ${{ secrets.SLACK_WEBHOOK_URL }}


  ci-app-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]
        mongodb-version: ['6.0', '8.0']

    services:
      mongodb:
        image: mongo:${{ matrix.mongodb-version }}
        ports:
          - 27017/tcp

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - &setup-node-step
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - &cache-restore-dist-step
        name: Cache/Restore dist
        uses: actions/cache@v4
        with:
          path: |
            **/.turbo
            **/dist
            **/node_modules/.cache/turbo
          key: dist-ci-app-${{ runner.OS }}-node${{ matrix.node-version }}-${{ github.sha }}
          restore-keys: |
            dist-ci-app-${{ runner.OS }}-node${{ matrix.node-version }}-

      - &install-dependencies-step
        name: Install dependencies
        run: |
          pnpm add turbo --global
          pnpm install --frozen-lockfile

      - name: Test
        run: |
          turbo run test --filter=@growi/app --filter=./packages/* --env-mode=loose
        env:
          MONGO_URI: mongodb://localhost:${{ job.services.mongodb.ports['27017'] }}/growi_test

      - name: Upload coverage report as artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-mongo${{ matrix.mongodb-version }}
          path: |
            apps/app/coverage
            packages/remark-growi-directive/coverage

      - name: Slack Notification
        uses: weseek/ghaction-slack-notification@master
        if: failure()
        with:
          type: ${{ job.status }}
          job_name: '*Node CI for growi - test (${{ matrix.node-version }})*'
          channel: '#ci'
          isCompactMode: true
          url: ${{ secrets.SLACK_WEBHOOK_URL }}


  ci-app-test-integration:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]
        mongodb-version: ['8.0']
        elasticsearch-version:
          - env: 8
            image: '8.19.16'
          - env: 9
            image: '9.3.3'

    services:
      mongodb:
        image: mongo:${{ matrix.mongodb-version }}
        ports:
          - 27017/tcp
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:${{ matrix.elasticsearch-version.image }}
        ports:
          - 9200/tcp
        env:
          discovery.type: single-node
          ES_JAVA_OPTS: -Xms256m -Xmx256m
          xpack.security.enabled: "false"
        options: >-
          --health-cmd="curl -sf http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=30s || exit 1"
          --health-interval=15s
          --health-timeout=40s
          --health-retries=5

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - *setup-node-step

      - *cache-restore-dist-step

      - *install-dependencies-step

      - name: Install Elasticsearch plugins
        run: |
          docker exec ${{ job.services.elasticsearch.id }} elasticsearch-plugin install --batch analysis-kuromoji
          docker exec ${{ job.services.elasticsearch.id }} elasticsearch-plugin install --batch analysis-icu
          docker restart ${{ job.services.elasticsearch.id }}
          for i in $(seq 1 30); do
            if curl -sf "http://localhost:${{ job.services.elasticsearch.ports['9200'] }}/_cluster/health?wait_for_status=yellow&timeout=5s" > /dev/null 2>&1; then
              echo "Elasticsearch is healthy"
              break
            fi
            echo "Waiting for Elasticsearch... ($i/30)"
            sleep 5
          done

      - name: Test
        run: |
          turbo run test:integ --filter=@growi/app --env-mode=loose
        env:
          MONGO_URI: mongodb://localhost:${{ job.services.mongodb.ports['27017'] }}/growi_test
          VITE_ELASTICSEARCH_URI: http://localhost:${{ job.services.elasticsearch.ports['9200'] }}/growi
          VITE_ELASTICSEARCH_VERSION: ${{ matrix.elasticsearch-version.env }}

      - name: Upload coverage report as artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-es${{ matrix.elasticsearch-version.env }}-mongo${{ matrix.mongodb-version }}
          path: |
            apps/app/coverage

      - name: Slack Notification
        uses: weseek/ghaction-slack-notification@master
        if: failure()
        with:
          type: ${{ job.status }}
          job_name: '*Node CI for growi - test-es (${{ matrix.node-version }})*'
          channel: '#ci'
          isCompactMode: true
          url: ${{ secrets.SLACK_WEBHOOK_URL }}


  ci-app-launch-dev:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]
        mongodb-version: ['6.0', '8.0']

    services:
      mongodb:
        image: mongo:${{ matrix.mongodb-version }}
        ports:
          - 27017/tcp

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Cache/Restore dist
        uses: actions/cache@v4
        with:
          path: |
            **/.turbo
            **/dist
            **/node_modules/.cache/turbo
          key: dist-ci-app-${{ runner.OS }}-node${{ matrix.node-version }}-${{ github.sha }}
          restore-keys: |
            dist-ci-app-${{ runner.OS }}-node${{ matrix.node-version }}-

      - name: Install dependencies
        run: |
          pnpm add turbo --global
          pnpm install --frozen-lockfile

      - name: turbo run launch-dev:ci
        working-directory: ./apps/app
        run: |
          cp config/ci/.env.local.for-ci .env.development.local
          turbo run launch-dev:ci --env-mode=loose
        env:
          MONGO_URI: mongodb://localhost:${{ job.services.mongodb.ports['27017'] }}/growi_dev

      - name: Slack Notification
        uses: weseek/ghaction-slack-notification@master
        if: failure()
        with:
          type: ${{ job.status }}
          job_name: '*Node CI for growi - launch-dev (${{ matrix.node-version }})*'
          channel: '#ci'
          isCompactMode: true
          url: ${{ secrets.SLACK_WEBHOOK_URL }}
