name: Release Docker Images for RC (for master)

on:
  schedule:
    # Weekdays at 24:00hrs (JST) Executed
    - cron: '0 15 * * 1-5'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:

  determine-tags:
    runs-on: ubuntu-latest

    outputs:
      TAGS: ${{ steps.meta.outputs.tags }}
      TAGS_GHCR: ${{ steps.meta-ghcr.outputs.tags }}

    steps:
    - uses: actions/checkout@v4

    - name: Retrieve information from package.json
      uses: myrotvorets/info-from-package-json-action@v2.0.2
      id: package-json

    - name: Docker meta for docker.io
      uses: docker/metadata-action@v5
      id: meta
      with:
        images: docker.io/weseek/growi
        sep-tags: ','
        tags: |
          type=raw,value=${{ steps.package-json.outputs.packageVersion }}.{{sha}}

    - name: Docker meta for ghcr.io
      uses: docker/metadata-action@v5
      id: meta-ghcr
      with:
        images: ghcr.io/weseek/growi
        sep-tags: ','
        tags: |
          type=raw,value=${{ steps.package-json.outputs.packageVersion }}.{{sha}}


  # Ingest step: runs STRICTLY BEFORE build-image-rc (as a `needs` predecessor).
  # It fetches models.dev and commits any diff to the branch so the subsequent
  # build consumes the refreshed HEAD. The build workflow itself performs no
  # fetch/commit — it only reads the committed model-catalog-data.json.
  refresh-model-catalog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      # New commit sha when the catalog changed; otherwise fall back to the
      # trigger sha so the build always has a valid source-version.
      sha: ${{ steps.commit.outputs.commit_hash || github.sha }}
    steps:
    - uses: actions/checkout@v4

    - uses: pnpm/action-setup@v6

    - uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'pnpm'

    - name: Install dependencies
      run: |
        pnpm add turbo --global
        pnpm install --frozen-lockfile

    - name: Refresh vendored model catalog (ingest step)
      working-directory: ./apps/app
      # On fetch/schema/empty failure vendor:models exits non-zero and preserves
      # the existing committed artifact, so the RC proceeds with the last-good
      # catalog (design Error Handling). No fetch/commit is added to the build.
      continue-on-error: true
      run: pnpm vendor:models

    - name: Commit refreshed catalog if changed
      id: commit
      # NOTE: `master` may be a protected branch. If branch protection rejects a
      # direct push, switch to the token/PR mechanism already used by
      # release.yml's `create-pr-for-next-rc` job (github-actions-x/commit with
      # secrets.GITHUB_TOKEN + repo-sync/pull-request). Do not introduce new
      # secret names.
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: 'chore(ai-settings-model-picker): refresh vendored model catalog'
        file_pattern: apps/app/src/features/mastra/server/services/ai-sdk-modules/model-catalog-data.json


  build-image-rc:
    needs: [refresh-model-catalog]
    uses: ./.github/workflows/reusable-app-build-image.yml
    with:
      source-version: ${{ needs.refresh-model-catalog.outputs.sha }}
      image-name: growilabs/growi
      tag-temporary: latest-rc
    secrets:
      AWS_ROLE_TO_ASSUME_FOR_OIDC: ${{ secrets.AWS_ROLE_TO_ASSUME_FOR_OIDC }}


  publish-image-rc:
    needs: [determine-tags, build-image-rc]

    uses: ./.github/workflows/reusable-app-create-manifests.yml
    with:
      tags: ${{ needs.determine-tags.outputs.TAGS }}
      registry: docker.io
      image-name: weseek/growi
      docker-registry-username: wsmoogle
      tag-temporary: latest-rc
    secrets:
      DOCKER_REGISTRY_PASSWORD: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
